<head>
<title>Texto Alinhado à Direita</title>
<style>
.direita {
text-align: right;
}
</style>
<style>
.esquerda {
text-align: left;
}
</style>
<style>
.centro {
text-align: center;
}
</style>
</head>
<body>
<p class="direita">Este texto está alinhado à direita.</p>
<p class="esquerda">Este texto está alinhado à esquerda.</p>
<p class="centro">Este texto está centralizado.</p>
</body>
</html>
